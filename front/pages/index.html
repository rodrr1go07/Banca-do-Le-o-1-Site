<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banca do Leão | Oficial</title>
    <link rel="stylesheet" href="../style/index.css">
    <link rel="icon" href="../img/logotipo.jpg">
</head>

<body>

<a href="/pages/admin.html" class="admin-login">Área do Administrador</a>

<main class="container">

    <header class="profile">
        <img src="../img/logotipo.jpg" alt="Logo Banca do Leão" class="logo">
        <h1>Banca do Leão 🦁</h1>
        <p class="slogan">Qualidade • Confiança • Preço Justo</p>
    </header>

    <section class="links">
        <a href="/pages/cardapio.html" target="_blank" class="card">
            <img src="../img/logotipo.jpg" alt="WhatsApp">
            <span>Veja nossos Produltos</span>
        </a>

        <a href="https://wa.me/5584986082887" target="_blank" class="card">
            <img src="../img/ZAP.png" alt="WhatsApp">
            <span>Fale Conosco no WhatsApp</span>
        </a>

        <a href="https://www.instagram.com/banca.do.leao/" target="_blank" class="card">
            <img src="../img/Instagram_icon.png" alt="Instagram">
            <span>Siga no Instagram</span>
        </a>

        <a href="https://www.tiktok.com/@banca.do.leao?lang=pt-BR" target="_blank" class="card">
            <img src="../img/TikTok.png" alt="TikTok">
            <span>Veja no TikTok</span>
        </a>

        <a href="/pages/local.html" class="card">
            <img src="../img/local.png" alt="Localização">
            <span>Localizações e Horários</span>
        </a>

    </section>

    <footer>
        <p>© 2026 Banca do Leão - Todos os direitos reservados</p>
    </footer>

</main>

<!-- VLibras (acessibilidade) -->
<div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
    </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
</script>

</body>
</html>
