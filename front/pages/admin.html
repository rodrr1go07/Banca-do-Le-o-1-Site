<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Banca do Leão</title>
<script>
    if (localStorage.getItem("siteTheme") === "dark") {
        document.documentElement.classList.add("dark-theme");
    }
</script>
<link rel="stylesheet" href="../style/admin.css">
<link rel="icon" href="../img/logotipo.jpg">
</head>
<body>

<button type="button" class="theme-toggle" data-theme-toggle aria-pressed="false">Modo escuro</button>

<main class="admin-shell">
    <section id="loginPanel" class="login-panel">
        <a href="index.html">
            <img src="../img/logotipo.jpg" alt="Logo Banca do Leão" class="logo">
        </a>
        <h1>Admin</h1>
        <form id="loginForm">
            <label>
                Usuário
                <input type="text" id="usuario" autocomplete="username" required>
            </label>
            <label>
                Senha
                <input type="password" id="senha" autocomplete="current-password" required>
            </label>
            <button type="submit">Entrar</button>
            <p id="loginMensagem" class="mensagem"></p>
        </form>
    </section>

    <section id="adminPanel" class="admin-panel" hidden>
        <header class="admin-header">
            <div>
                <h1>Produtos</h1>
                <p>Altere preços e imagens do cardápio.</p>
            </div>
            <a href="cardapio.html">Ver cardápio</a>
        </header>

        <div id="produtosAdmin" class="produtos-admin"></div>
    </section>
</main>

<script src="../scripts/admin.js"></script>
<script src="../scripts/theme.js"></script>
</body>
</html>
