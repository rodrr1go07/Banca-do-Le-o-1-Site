<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizações | Banca do Leão</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logotipo.jpg">
</head>

<body>

<main class="container">

    <header class="profile">
        <img src="logotipo.jpg" alt="Logo Banca do Leão" class="logo">
        <h1>Banca do Leão 🦁</h1>
        <p class="slogan">Veja onde nos encontrar</p>
    </header>

    <section class="links">

        <a href="https://www.google.com/maps" target="_blank" class="card">
            <img src="local.png" alt="Mapa">
            <span>Sexta-feira • 08:00 às 12:00</span>
        </a>

        <a href="https://www.google.com/maps" target="_blank" class="card">
            <img src="local.png" alt="Mapa">
            <span>Sábado e Domingo • 07:30 às 12:00</span>
        </a>

    </section>

    <a href="index.html" class="btn-voltar">
        ← Voltar para Página Inicial
    </a>

    <footer>
        <p>© 2026 Banca do Leão - Todos os direitos reservados</p>
    </footer>

</main>

<!-- VLibras (acessibilidade) -->
<div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
    </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
</script>
</body>
</html>
