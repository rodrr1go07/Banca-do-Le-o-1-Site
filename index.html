<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=front/pages/index.html">
    <title>Banca do Leao</title>
    <link rel="canonical" href="front/pages/index.html">
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f1e8;
            --panel: #fffaf2;
            --text: #2c1b11;
            --muted: #725845;
            --accent: #b7281f;
            --accent-dark: #811b16;
            --ring: rgba(183, 40, 31, 0.22);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: radial-gradient(circle at top, #fff4dd 0, var(--bg) 48%, #ead9c8 100%);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        main {
            width: min(100%, 420px);
            padding: 34px 28px;
            border: 1px solid rgba(44, 27, 17, 0.1);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 18px 48px rgba(44, 27, 17, 0.16);
            text-align: center;
        }

        img {
            width: 92px;
            height: 92px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 0 0 8px var(--ring);
        }

        h1 {
            margin: 22px 0 8px;
            font-size: 1.75rem;
            line-height: 1.1;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            margin-top: 22px;
            padding: 0 18px;
            border-radius: 6px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            text-decoration: none;
            transition: background 160ms ease, transform 160ms ease;
        }

        a:hover,
        a:focus-visible {
            background: var(--accent-dark);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <main>
        <img src="front/img/logotipo.png" alt="Logo Banca do Leao">
        <h1>Banca do Leao</h1>
        <p>Redirecionando para a pagina inicial...</p>
        <a href="front/pages/index.html">Entrar no site</a>
    </main>
</body>
</html>
